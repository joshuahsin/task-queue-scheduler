spring.application.name=task-worker
spring.main.web-application-type=none

worker.name=${WORKER_NAME:}
worker.queue-type=${WORKER_QUEUE_TYPE:HIGH_PRIORITY}
worker.capacity=${WORKER_CAPACITY:4}
worker.version=${WORKER_VERSION:0.0.1}
worker.scheduler-api-base-url=${SCHEDULER_API_BASE_URL:http://localhost:8080}
worker.heartbeat-interval-ms=${WORKER_HEARTBEAT_INTERVAL_MS:30000}
worker.poll-delay-ms=${WORKER_POLL_DELAY_MS:1000}

# OCI Queue connection. auth.method is "config-file" for local dev (reads ~/.oci/config) or
# "instance-principal" when actually running on the OCI compute instance (no credentials needed —
# identity comes from the instance itself via IAM dynamic group policy).
oci.auth.method=${OCI_AUTH_METHOD:config-file}
oci.region=${OCI_REGION:us-ashburn-1}
# The one queue OCID matching this instance's worker.queue-type — a worker instance is only ever
# assigned to one queue, so there's no per-type lookup table here (unlike scheduler-api).
oci.queue.ocid=${WORKER_QUEUE_OCID:}
