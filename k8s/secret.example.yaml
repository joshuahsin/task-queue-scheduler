# Copy to secret.yaml (already gitignored via the repo's `*.env`-style secret handling — add
# k8s/secret.yaml to .gitignore too before filling this in) and apply with:
#   kubectl apply -f k8s/secret.yaml
# Never commit a filled-in secret.yaml — same rule as the existing .env files.
#
# Note: OCI_AUTH_METHOD=config-file (the default) needs ~/.oci/config mounted into the pod as a
# volume, which this reference setup doesn't wire up — either mount that config as its own Secret
# volume, or use instance-principal auth if actually running on real OCI compute (not applicable to
# a local minikube cluster). Worker registration/heartbeat/health-tracking work over plain HTTP to
# scheduler-api regardless of whether OCI auth is fully wired up; only actual queue polling needs it.
apiVersion: v1
kind: Secret
metadata:
  name: task-queue-secrets
type: Opaque
stringData:
  JWT_SECRET: "replace-with-a-real-secret-not-the-dev-default"
  DB_URL: "jdbc:postgresql://<host>:5432/taskqueue"
  DB_USERNAME: "postgres"
  DB_PASSWORD: "<password>"
  OCI_REGION: "us-ashburn-1"
  OCI_QUEUE_HIGH_PRIORITY_OCID: "<ocid>"
  OCI_QUEUE_DEFAULT_PRIORITY_OCID: "<ocid>"
  # Whichever OCID matches task-worker's own WORKER_QUEUE_TYPE (HIGH_PRIORITY or DEFAULT_PRIORITY)
  WORKER_QUEUE_OCID: "<ocid>"
  REDIS_HOST: "<host>"
  REDIS_PORT: "6379"
  REDIS_USERNAME: ""
  REDIS_PASSWORD: "<password, blank if none>"
