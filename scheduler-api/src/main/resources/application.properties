spring.application.name=task-queue-scheduler

# Local-dev-only default. Override with a real secret via env var in any shared/deployed environment.
jwt.secret=${JWT_SECRET:uF3H1w6KEkycZgLeVBuqT2GtM8Rw3jiYKyRmxUTTCts=}
jwt.expiration-ms=3600000

# No credentials committed here — set DB_URL/DB_USERNAME/DB_PASSWORD as environment variables.
# Local default points at a local Postgres so `mvn spring-boot:run` works out of the box without env vars.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/taskqueue}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway owns the schema — Hibernate only validates entities match it, never auto-generates DDL.
spring.jpa.hibernate.ddl-auto=validate

# OCI Queue connection. auth.method is "config-file" for local dev (reads ~/.oci/config) or
# "instance-principal" when actually running on the OCI compute instance (no credentials needed —
# identity comes from the instance itself via IAM dynamic group policy).
oci.auth.method=${OCI_AUTH_METHOD:config-file}
oci.region=${OCI_REGION:us-ashburn-1}
oci.queue.high-priority-ocid=${OCI_QUEUE_HIGH_PRIORITY_OCID:}
oci.queue.default-priority-ocid=${OCI_QUEUE_DEFAULT_PRIORITY_OCID:}

# Redis backs the per-tenant rate limiter (RateLimiterService). Local default points at a local
# Redis so `mvn spring-boot:run` works out of the box without env vars, same as Postgres/OCI above.
# No credentials committed here — set REDIS_USERNAME/REDIS_PASSWORD as environment variables for
# any Redis that actually requires auth (a local dev Redis typically doesn't).
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.password=${REDIS_PASSWORD:}
# Short timeouts so a downed Redis fails fast — RateLimiterService then fails open rather than a
# task-creation request hanging on a dead connection.
spring.data.redis.connect-timeout=${REDIS_CONNECT_TIMEOUT:200ms}
spring.data.redis.timeout=${REDIS_COMMAND_TIMEOUT:200ms}

# Fixed-window size backing RateLimiterService's per-tenant Redis counters. Plan.rate_limit values
# (FREE=60, PREMIUM=600 in V2__seed_plans.sql) are seeded assuming a 60-second window.
rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:60}

# Passive worker health sweep (WorkerService.sweepStaleWorkers). A worker that stops heartbeating
# without ever calling the deregister endpoint (crash, kill, network partition) is flagged UNHEALTHY
# after ~3 missed heartbeats (assuming the default 30s worker.heartbeat-interval-ms), then OFFLINE
# after a much longer silence — two thresholds so one missed beat doesn't declare a worker dead.
worker.health.sweep-interval-ms=${WORKER_HEALTH_SWEEP_INTERVAL_MS:30000}
worker.health.unhealthy-after-ms=${WORKER_HEALTH_UNHEALTHY_AFTER_MS:90000}
worker.health.offline-after-ms=${WORKER_HEALTH_OFFLINE_AFTER_MS:300000}

