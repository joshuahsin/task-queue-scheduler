spring.application.name=task-queue-scheduler

# Local-dev-only default. Override with a real secret via env var in any shared/deployed environment.
jwt.secret=${JWT_SECRET:uF3H1w6KEkycZgLeVBuqT2GtM8Rw3jiYKyRmxUTTCts=}
jwt.expiration-ms=3600000

# No credentials committed here — set DB_URL/DB_USERNAME/DB_PASSWORD as environment variables.
# Local default points at a local Postgres so `mvn spring-boot:run` works out of the box without env vars.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/taskqueue}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway owns the schema — Hibernate only validates entities match it, never auto-generates DDL.
spring.jpa.hibernate.ddl-auto=validate

# OCI Queue connection. auth.method is "config-file" for local dev (reads ~/.oci/config) or
# "instance-principal" when actually running on the OCI compute instance (no credentials needed —
# identity comes from the instance itself via IAM dynamic group policy).
oci.auth.method=${OCI_AUTH_METHOD:config-file}
oci.region=${OCI_REGION:us-ashburn-1}
oci.queue.high-priority-ocid=${OCI_QUEUE_HIGH_PRIORITY_OCID:}
oci.queue.default-priority-ocid=${OCI_QUEUE_DEFAULT_PRIORITY_OCID:}
